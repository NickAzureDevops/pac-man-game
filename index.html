<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pacman Services Dashboard</title>
  </head>
  <body>
    <h1>Pac-Man Events</h1>
    <ul id="events"></ul>

    <script>
      const eventsList = document.getElementById('events');

      function renderEvents(events) {
        eventsList.innerHTML = '';

        events.forEach((event) => {
          const item = document.createElement('li');
          const type = event?.type || event?.eventType || 'unknown';
          item.innerHTML = `<strong>${type}</strong><pre>${JSON.stringify(event, null, 2)}</pre>`;
          eventsList.appendChild(item);
        });
      }

      async function refreshEvents() {
        try {
          const response = await fetch('/events');
          const events = await response.json();
          renderEvents(events);
        } catch (error) {
          eventsList.innerHTML = `<li>Failed to load events: ${error.message}</li>`;
        }
      }

      refreshEvents();
      setInterval(refreshEvents, 1500);
    </script>
  </body>
</html>
